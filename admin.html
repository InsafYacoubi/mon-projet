<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>California Gym - Admin</title>
    <style>
      :root {
        --bg0: #f7fbff;
        --bg1: #eef6ff;
        --card: rgba(255, 255, 255, 0.9);
        --text: #0f172a;
        --muted: rgba(15, 23, 42, 0.7);
        --line: rgba(16, 65, 120, 0.18);
        --a1: #60a5fa;
        --a2: #22d3ee;
        --ok-bg: rgba(34, 197, 94, 0.12);
        --ok-tx: #166534;
        --err-bg: rgba(239, 68, 68, 0.12);
        --err-tx: #991b1b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 500 16px/1.55 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1000px 500px at 15% 0%, rgba(96, 165, 250, 0.3), transparent 55%),
          radial-gradient(900px 500px at 85% 15%, rgba(34, 211, 238, 0.22), transparent 52%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
      }
      .wrap {
        width: min(1100px, calc(100% - 40px));
        margin: 30px auto;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(9, 32, 68, 0.1);
      }
      h1, h2 { margin: 0 0 12px; letter-spacing: -0.3px; }
      p { margin: 0; color: var(--muted); }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .hidden { display: none !important; }
      form { display: grid; gap: 12px; max-width: 440px; }
      label { display: grid; gap: 6px; font-weight: 700; font-size: 14px; }
      input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        font: inherit;
      }
      input:focus {
        outline: none;
        border-color: var(--a1);
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.22);
      }
      .btn {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        color: #0b1220;
        background: linear-gradient(135deg, var(--a2), var(--a1));
      }
      .btn.secondary {
        color: var(--text);
        background: #fff;
        border: 1px solid var(--line);
      }
      .feedback {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid transparent;
        font-size: 14px;
        font-weight: 600;
      }
      .feedback.ok { background: var(--ok-bg); color: var(--ok-tx); border-color: rgba(34, 197, 94, 0.35); }
      .feedback.err { background: var(--err-bg); color: var(--err-tx); border-color: rgba(239, 68, 68, 0.35); }
      .table-wrap { overflow-x: auto; margin-top: 12px; }
      table { width: 100%; border-collapse: collapse; min-width: 680px; }
      th, td {
        text-align: left;
        border-bottom: 1px solid var(--line);
        padding: 10px;
        vertical-align: top;
        font-size: 14px;
      }
      th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section id="login-view" class="card">
        <h1>Admin California Gym</h1>
        <p>Connecte-toi pour consulter les demandes de contact.</p>
        <form id="login-form" style="margin-top: 16px;" novalidate>
          <label for="email">Email
            <input id="email" name="email" type="email" required placeholder="admin@california-gym.com" />
          </label>
          <label for="password">Mot de passe
            <input id="password" name="password" type="password" required placeholder="Admin1234!" />
          </label>
          <button class="btn" type="submit">Se connecter</button>
        </form>
        <div id="login-feedback" class="feedback hidden" role="status" aria-live="polite"></div>
      </section>

      <section id="dashboard-view" class="card hidden">
        <div class="topbar">
          <div>
            <h2>Contacts reçus</h2>
            <p id="contacts-count">0 contact</p>
          </div>
          <div style="display: flex; gap: 8px;">
            <button id="refresh-btn" class="btn secondary" type="button">Rafraîchir</button>
            <button id="logout-btn" class="btn secondary" type="button">Déconnexion</button>
          </div>
        </div>
        <div id="dashboard-feedback" class="feedback hidden" role="status" aria-live="polite"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Message</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="contacts-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const TOKEN_KEY = "cg_admin_token";
        const loginView = document.getElementById("login-view");
        const dashboardView = document.getElementById("dashboard-view");
        const loginForm = document.getElementById("login-form");
        const loginFeedback = document.getElementById("login-feedback");
        const dashboardFeedback = document.getElementById("dashboard-feedback");
        const contactsBody = document.getElementById("contacts-body");
        const contactsCount = document.getElementById("contacts-count");
        const refreshBtn = document.getElementById("refresh-btn");
        const logoutBtn = document.getElementById("logout-btn");

        function setFeedback(el, text, type) {
          el.textContent = text;
          el.classList.remove("hidden", "ok", "err");
          el.classList.add(type === "err" ? "err" : "ok");
        }
        function hideFeedback(el) {
          el.textContent = "";
          el.classList.add("hidden");
          el.classList.remove("ok", "err");
        }
        function setView(isLoggedIn) {
          loginView.classList.toggle("hidden", isLoggedIn);
          dashboardView.classList.toggle("hidden", !isLoggedIn);
        }
        function getToken() {
          return localStorage.getItem(TOKEN_KEY);
        }
        function setToken(token) {
          localStorage.setItem(TOKEN_KEY, token);
        }
        function clearToken() {
          localStorage.removeItem(TOKEN_KEY);
        }

        function renderContacts(contacts) {
          contactsBody.innerHTML = "";
          if (!Array.isArray(contacts) || contacts.length === 0) {
            contactsBody.innerHTML = "<tr><td colspan=\"5\">Aucun contact trouvé.</td></tr>";
            contactsCount.textContent = "0 contact";
            return;
          }
          contactsCount.textContent = contacts.length + (contacts.length > 1 ? " contacts" : " contact");

          for (const c of contacts) {
            const tr = document.createElement("tr");
            const date = c.created_at ? new Date(c.created_at).toLocaleString("fr-FR") : "-";
            tr.innerHTML =
              "<td>" + (c.id ?? "-") + "</td>" +
              "<td>" + (c.nom ?? "-") + "</td>" +
              "<td>" + (c.email ?? "-") + "</td>" +
              "<td>" + (c.message ?? "-") + "</td>" +
              "<td>" + date + "</td>";
            contactsBody.appendChild(tr);
          }
        }

        async function loadContacts() {
          hideFeedback(dashboardFeedback);
          const token = getToken();
          if (!token) {
            setView(false);
            return;
          }

          const res = await fetch("/api/contacts", {
            headers: { Authorization: "Bearer " + token },
          });
          const data = await res.json().catch(function () { return {}; });

          if (res.status === 401) {
            clearToken();
            setView(false);
            setFeedback(loginFeedback, "Session expirée. Reconnecte-toi.", "err");
            return;
          }

          if (!res.ok) {
            setFeedback(dashboardFeedback, data.message || "Impossible de charger les contacts.", "err");
            return;
          }

          renderContacts(data.contacts || []);
        }

        loginForm.addEventListener("submit", async function (e) {
          e.preventDefault();
          hideFeedback(loginFeedback);

          const email = String(document.getElementById("email").value || "").trim();
          const password = String(document.getElementById("password").value || "");
          if (!email || !password) {
            setFeedback(loginFeedback, "Email et mot de passe requis.", "err");
            return;
          }

          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password }),
          });
          const data = await res.json().catch(function () { return {}; });

          if (!res.ok || !data.token) {
            setFeedback(loginFeedback, data.message || "Connexion impossible.", "err");
            return;
          }

          setToken(data.token);
          setView(true);
          await loadContacts();
          setFeedback(dashboardFeedback, "Connexion réussie.", "ok");
          loginForm.reset();
        });

        refreshBtn.addEventListener("click", function () {
          loadContacts().catch(function () {
            setFeedback(dashboardFeedback, "Erreur lors du rafraîchissement.", "err");
          });
        });

        logoutBtn.addEventListener("click", function () {
          clearToken();
          setView(false);
          hideFeedback(dashboardFeedback);
          setFeedback(loginFeedback, "Déconnecté.", "ok");
        });

        if (getToken()) {
          setView(true);
          loadContacts().catch(function () {
            setFeedback(dashboardFeedback, "Erreur lors du chargement initial.", "err");
          });
        } else {
          setView(false);
        }
      })();
    </script>
  </body>
</html>
